<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 616" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fff"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; fill: #475569; font-weight: 600; }
    .step-light { font-size: 11.5px; fill: #fff; }
    .note { font-size: 10.5px; fill: #94a3b8; font-style: italic; }
  </style>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" class="title">Request Pipeline Execution</text>
  <text x="440" y="50" text-anchor="middle" class="subtitle">GET /todos — steps execute top-to-bottom, left-to-right</text>

  <!-- ===== CONFIG LEVEL ===== -->
  <rect x="40" y="75" width="800" height="80" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Label column -->
  <text x="60" y="108" class="label">CONFIG .before</text>
  <text x="60" y="125" class="note">runs on every request</text>

  <!-- Step column -->
  <rect x="280" y="95" width="130" height="36" rx="6" fill="#3b82f6"/>
  <text x="345" y="118" text-anchor="middle" class="step-light">session()</text>

  <line x1="420" y1="113" x2="770" y2="113" stroke="#cbd5e1" stroke-dasharray="4,4"/>

  <!-- ===== RESOURCE LEVEL ===== -->
  <rect x="70" y="180" width="740" height="80" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>

  <!-- Label column -->
  <text x="90" y="213" class="label">RESOURCE /todos .before</text>
  <text x="90" y="230" class="note">runs on every verb for this URL</text>

  <!-- Step column -->
  <rect x="380" y="200" width="130" height="36" rx="6" fill="#8b5cf6"/>
  <text x="445" y="223" text-anchor="middle" class="step-light">logged_in()</text>

  <line x1="520" y1="218" x2="740" y2="218" stroke="#94a3b8" stroke-dasharray="4,4"/>

  <!-- ===== VERB LEVEL ===== -->
  <rect x="100" y="286" width="680" height="90" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

  <!-- Label -->
  <text x="120" y="312" class="label" style="fill:#94a3b8">GET pipeline</text>

  <!-- Steps row -->
  <rect x="120" y="326" width="80" height="34" rx="5" fill="#0ea5e9"/>
  <text x="160" y="348" text-anchor="middle" class="step-light">param</text>

  <line x1="210" y1="343" x2="232" y2="343" stroke="#fff" stroke-width="1" marker-end="url(#arrow-w)"/>

  <rect x="242" y="326" width="68" height="34" rx="5" fill="#0ea5e9"/>
  <text x="276" y="348" text-anchor="middle" class="step-light">db</text>

  <line x1="320" y1="343" x2="342" y2="343" stroke="#fff" stroke-width="1" marker-end="url(#arrow-w)"/>

  <rect x="352" y="326" width="68" height="34" rx="5" fill="#0ea5e9"/>
  <text x="386" y="348" text-anchor="middle" class="step-light">call</text>

  <line x1="430" y1="343" x2="452" y2="343" stroke="#fff" stroke-width="1" marker-end="url(#arrow-w)"/>

  <rect x="462" y="326" width="86" height="34" rx="5" fill="#0ea5e9"/>
  <text x="505" y="348" text-anchor="middle" class="step-light">render</text>

  <!-- ===== .AFTER UNWIND ===== -->
  <rect x="100" y="402" width="680" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" class="label" style="fill:#92400e">.after steps unwind (verb → resource → config)</text>

  <!-- ===== CONTEXT BAR ===== -->
  <rect x="40" y="478" width="800" height="86" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>

  <text x="60" y="500" class="label" style="fill:#065f46">CONTEXT</text>
  <text x="160" y="500" class="note" style="fill:#059669">shared state — every step reads and writes the same context</text>

  <rect x="60" y="514" width="90" height="28" rx="4" fill="#10b981"/>
  <text x="105" y="533" text-anchor="middle" class="step-light">user_id</text>

  <rect x="162" y="514" width="80" height="28" rx="4" fill="#10b981"/>
  <text x="202" y="533" text-anchor="middle" class="step-light">todos</text>

  <rect x="254" y="514" width="70" height="28" rx="4" fill="#10b981"/>
  <text x="289" y="533" text-anchor="middle" class="step-light">page</text>

  <rect x="336" y="514" width="95" height="28" rx="4" fill="#10b981"/>
  <text x="383" y="533" text-anchor="middle" class="step-light">time_ago</text>

  <rect x="443" y="514" width="50" height="28" rx="4" fill="#10b981"/>
  <text x="468" y="533" text-anchor="middle" class="step-light">...</text>

  <!-- ===== VERTICAL FLOW ARROWS ===== -->
  <line x1="345" y1="155" x2="345" y2="178" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="445" y1="260" x2="445" y2="284" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="376" x2="440" y2="400" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="446" x2="440" y2="476" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== FOOTER ===== -->
  <text x="440" y="594" text-anchor="middle" class="note">param → db → call → render → sse → emit — mix any steps in any order</text>
</svg>