<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
    <marker id="a-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; fill: #475569; font-weight: 600; }
    .label-w { font-size: 12px; fill: #fff; font-weight: 600; }
    .sm { font-size: 11px; fill: #64748b; }
    .sm-w { font-size: 11px; fill: #cbd5e1; }
    .note { font-size: 10px; fill: #94a3b8; font-style: italic; }
    .code { font-size: 11px; fill: #e2e8f0; }
  </style>

  <text x="440" y="32" text-anchor="middle" class="title">Resolution Order</text>
  <text x="440" y="50" text-anchor="middle" class="subtitle">resources &amp; context resolve top-down (first wins) — errors resolve bottom-up (nearest wins)</text>

  <!-- LEFT SIDE: Top-down resolution -->
  <text x="220" y="85" text-anchor="middle" class="label" style="fill:#22c55e">Resources, Context, Databases</text>
  <text x="220" y="100" text-anchor="middle" class="note">first registration wins ↓</text>

  <!-- main.c -->
  <rect x="80" y="115" width="280" height="65" rx="8" fill="#1e293b"/>
  <text x="100" y="137" class="label-w">main.c</text>
  <text x="100" y="155" class="code">.context = {{"login", my_login}}</text>
  <text x="100" y="170" class="code">.includes = {session_auth_config}</text>

  <line x1="220" y1="180" x2="220" y2="200" stroke="#22c55e" stroke-width="2" marker-end="url(#a-grn)"/>

  <!-- session_auth -->
  <rect x="80" y="205" width="280" height="65" rx="8" fill="#334155"/>
  <text x="100" y="227" class="label-w">session_auth</text>
  <text x="100" y="245" class="code">.context = {{"login", default}}</text>
  <text x="100" y="260" class="sm-w">← ignored, main.c already set it</text>

  <line x1="220" y1="270" x2="220" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#a-grn)"/>

  <!-- resolved -->
  <rect x="80" y="295" width="280" height="40" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="220" y="320" text-anchor="middle" class="label" style="fill:#166534">"login" → my_login (from main.c)</text>

  <!-- RIGHT SIDE: Bottom-up error resolution -->
  <text x="660" y="85" text-anchor="middle" class="label" style="fill:#ef4444">Error Handlers</text>
  <text x="660" y="100" text-anchor="middle" class="note">nearest handler wins ↑</text>

  <!-- URL level -->
  <rect x="520" y="115" width="280" height="52" rx="8" fill="#1e293b"/>
  <text x="540" y="137" class="label-w">URL /todos/:id</text>
  <text x="540" y="152" class="code">.errors = {404 → "todo_missing"}</text>

  <line x1="660" y1="167" x2="660" y2="182" stroke="#ef4444" stroke-width="2" marker-end="url(#a-red)"/>

  <!-- Resource level -->
  <rect x="520" y="187" width="280" height="52" rx="8" fill="#334155"/>
  <text x="540" y="209" class="label-w">resources</text>
  <text x="540" y="224" class="code">.errors = {404 → "not_found"}</text>

  <line x1="660" y1="239" x2="660" y2="254" stroke="#ef4444" stroke-width="2" marker-end="url(#a-red)"/>

  <!-- Config level -->
  <rect x="520" y="259" width="280" height="52" rx="8" fill="#475569"/>
  <text x="540" y="281" class="label-w">config</text>
  <text x="540" y="296" class="code">.errors = {404 → "global_404"}</text>

  <!-- Result -->
  <rect x="520" y="332" width="280" height="50" rx="8" fill="#fef2f2" stroke="#ef4444"/>
  <text x="660" y="353" text-anchor="middle" class="sm" style="fill:#991b1b; font-weight:600">404 on /todos/:id</text>
  <text x="660" y="369" text-anchor="middle" class="label" style="fill:#991b1b">→ "todo_missing" (URL level)</text>

  <!-- Arrow from URL to result -->
  <path d="M810,141 C840,141 840,357 810,357" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <circle cx="810" cy="357" r="3" fill="#ef4444"/>

  <!-- Bottom summary -->
  <rect x="40" y="400" width="800" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="440" y="420" text-anchor="middle" class="sm">override module defaults by registering your own context, databases, or templates — your code always wins</text>
</svg>