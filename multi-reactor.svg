<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; fill: #475569; font-weight: 600; }
    .label-w { font-size: 12px; fill: #fff; font-weight: 600; }
    .sm { font-size: 10.5px; fill: #64748b; }
    .sm-w { font-size: 10.5px; fill: #cbd5e1; }
    .note { font-size: 10px; fill: #94a3b8; font-style: italic; }
  </style>

  <text x="440" y="32" text-anchor="middle" class="title">Multi-Reactor Architecture</text>
  <text x="440" y="50" text-anchor="middle" class="subtitle">each CPU core runs an independent event loop — no shared state between reactors</text>

  <!-- Incoming requests -->
  <rect x="340" y="70" width="200" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="440" y="95" text-anchor="middle" class="label">Incoming Requests</text>

  <line x1="370" y1="110" x2="170" y2="150" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="110" x2="440" y2="150" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="510" y1="110" x2="710" y2="150" stroke="#64748b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Reactor 1 -->
  <rect x="40" y="155" width="260" height="340" rx="10" fill="#1e293b"/>
  <text x="170" y="180" text-anchor="middle" class="label-w">Reactor 0 (Core 0)</text>

  <!-- Event loop -->
  <rect x="60" y="195" width="220" height="35" rx="5" fill="#334155"/>
  <text x="170" y="217" text-anchor="middle" class="sm-w">event loop (libuv)</text>

  <!-- Arena pool -->
  <rect x="60" y="242" width="220" height="35" rx="5" fill="#0f766e"/>
  <text x="170" y="264" text-anchor="middle" class="sm" style="fill:#ccfbf1">arena pool (pre-allocated)</text>

  <!-- Pipeline boxes -->
  <rect x="70" y="292" width="200" height="56" rx="5" fill="#0ea5e9"/>
  <text x="170" y="312" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">Pipeline → arena</text>
  <text x="170" y="328" text-anchor="middle" class="sm" style="fill:#bae6fd">param → db → call → render</text>

  <rect x="70" y="358" width="200" height="56" rx="5" fill="#0ea5e9" opacity="0.6"/>
  <text x="170" y="378" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">Pipeline → arena</text>
  <text x="170" y="394" text-anchor="middle" class="sm" style="fill:#bae6fd">param → db → emit → sse</text>

  <rect x="70" y="424" width="200" height="50" rx="5" fill="#334155"/>
  <text x="170" y="444" text-anchor="middle" class="sm-w">auto-free on</text>
  <text x="170" y="458" text-anchor="middle" class="sm-w">pipeline complete</text>

  <!-- Reactor 2 -->
  <rect x="310" y="155" width="260" height="340" rx="10" fill="#1e293b"/>
  <text x="440" y="180" text-anchor="middle" class="label-w">Reactor 1 (Core 1)</text>

  <rect x="330" y="195" width="220" height="35" rx="5" fill="#334155"/>
  <text x="440" y="217" text-anchor="middle" class="sm-w">event loop (libuv)</text>

  <rect x="330" y="242" width="220" height="35" rx="5" fill="#0f766e"/>
  <text x="440" y="264" text-anchor="middle" class="sm" style="fill:#ccfbf1">arena pool (pre-allocated)</text>

  <rect x="340" y="292" width="200" height="56" rx="5" fill="#0ea5e9"/>
  <text x="440" y="312" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">Pipeline → arena</text>
  <text x="440" y="328" text-anchor="middle" class="sm" style="fill:#bae6fd">db → call → datastar</text>

  <rect x="340" y="358" width="200" height="56" rx="5" fill="#0ea5e9" opacity="0.6"/>
  <text x="440" y="378" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">Pipeline → arena</text>
  <text x="440" y="394" text-anchor="middle" class="sm" style="fill:#bae6fd">param → call → redirect</text>

  <rect x="340" y="424" width="200" height="50" rx="5" fill="#334155"/>
  <text x="440" y="444" text-anchor="middle" class="sm-w">auto-free on</text>
  <text x="440" y="458" text-anchor="middle" class="sm-w">pipeline complete</text>

  <!-- Reactor N -->
  <rect x="580" y="155" width="260" height="340" rx="10" fill="#1e293b"/>
  <text x="710" y="180" text-anchor="middle" class="label-w">Reactor N (Core N)</text>

  <rect x="600" y="195" width="220" height="35" rx="5" fill="#334155"/>
  <text x="710" y="217" text-anchor="middle" class="sm-w">event loop (libuv)</text>

  <rect x="600" y="242" width="220" height="35" rx="5" fill="#0f766e"/>
  <text x="710" y="264" text-anchor="middle" class="sm" style="fill:#ccfbf1">arena pool (pre-allocated)</text>

  <rect x="610" y="292" width="200" height="56" rx="5" fill="#0ea5e9"/>
  <text x="710" y="312" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">Pipeline → arena</text>
  <text x="710" y="328" text-anchor="middle" class="sm" style="fill:#bae6fd">param → db → render</text>

  <rect x="610" y="358" width="200" height="116" rx="5" fill="#334155"/>
  <text x="710" y="408" text-anchor="middle" class="sm-w">idle</text>

  <!-- Lock-free messaging -->
  <line x1="300" y1="370" x2="310" y2="370" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="570" y1="370" x2="580" y2="370" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>

  <text x="440" y="530" text-anchor="middle" class="sm" style="fill:#f59e0b; font-weight:600">← lock-free messaging for SSE &amp; events →</text>

  <!-- Bottom notes -->
  <text x="440" y="560" text-anchor="middle" class="note">no threads, no locks, no callbacks in application code</text>
</svg>