<div id="todo_{{id}}">
  {{^finished}}
    <input type="checkbox" data-on:click__prevent="@patch('{{url:todo:id}}?finished=1')">
  {{/finished}}
  {{#finished}}
    <input type="checkbox" checked data-on:click__prevent="@patch('{{url:todo:id}}')">
  {{/finished}}
  {{title}}
  <button data-on:click="@delete('{{url:todo:id}}')">delete</button>
</div>
