<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">
  <defs>
    <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 11px; fill: #94a3b8; }
    .label { font-size: 12px; font-weight: 600; }
    .sm { font-size: 10.5px; }
    .xs { font-size: 9.5px; }
    .note { font-size: 10px; fill: #94a3b8; font-style: italic; }
  </style>

  <text x="440" y="32" text-anchor="middle" class="title">Module Composition &amp; Events</text>
  <text x="440" y="50" text-anchor="middle" class="subtitle">modules are autonomous — they communicate through hypermedia or pub/sub events</text>

  <!-- main.c outer box -->
  <rect x="30" y="70" width="820" height="280" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="93" class="label" style="fill:#475569">main.c</text>
  <text x="135" y="93" class="sm" style="fill:#94a3b8">.includes = {todos_config, activity_config, session_auth_config, datastar_config}</text>

  <!-- Todos module -->
  <rect x="55" y="110" width="230" height="220" rx="8" fill="#1e293b"/>
  <text x="170" y="135" text-anchor="middle" class="label" style="fill:#fff">todos</text>

  <rect x="70" y="148" width="200" height="28" rx="4" fill="#334155"/>
  <text x="170" y="167" text-anchor="middle" class="sm" style="fill:#94a3b8">routes: /todos, /todos/:id</text>

  <rect x="70" y="184" width="200" height="28" rx="4" fill="#334155"/>
  <text x="170" y="203" text-anchor="middle" class="sm" style="fill:#94a3b8">db: todos_db (sqlite)</text>

  <rect x="70" y="220" width="200" height="28" rx="4" fill="#334155"/>
  <text x="170" y="239" text-anchor="middle" class="sm" style="fill:#94a3b8">templates: todo, todos</text>

  <rect x="70" y="260" width="200" height="28" rx="4" fill="#f59e0b"/>
  <text x="170" y="279" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">publishes: todo_created</text>

  <rect x="70" y="296" width="200" height="22" rx="4" fill="#78716c"/>
  <text x="170" y="312" text-anchor="middle" class="xs" style="fill:#fef3c7">.with = {"user_id", "title"}</text>

  <!-- Activity module -->
  <rect x="325" y="110" width="230" height="220" rx="8" fill="#1e293b"/>
  <text x="440" y="135" text-anchor="middle" class="label" style="fill:#fff">activity</text>

  <rect x="340" y="148" width="200" height="28" rx="4" fill="#334155"/>
  <text x="440" y="167" text-anchor="middle" class="sm" style="fill:#94a3b8">routes: /activity</text>

  <rect x="340" y="184" width="200" height="28" rx="4" fill="#334155"/>
  <text x="440" y="203" text-anchor="middle" class="sm" style="fill:#94a3b8">db: activity_db (sqlite)</text>

  <rect x="340" y="220" width="200" height="28" rx="4" fill="#334155"/>
  <text x="440" y="239" text-anchor="middle" class="sm" style="fill:#94a3b8">templates: activity</text>

  <rect x="340" y="260" width="200" height="28" rx="4" fill="#8b5cf6"/>
  <text x="440" y="279" text-anchor="middle" class="sm" style="fill:#fff; font-weight:600">subscribes: todo_created</text>

  <rect x="340" y="296" width="200" height="22" rx="4" fill="#78716c"/>
  <text x="440" y="312" text-anchor="middle" class="xs" style="fill:#e9d5ff">db → insert_activity.sql</text>

  <!-- Event arrow -->
  <path d="M270,274 C298,274 298,274 325,274" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#aw)"/>
  <text x="297" y="265" text-anchor="middle" class="xs" style="fill:#f59e0b; font-weight:700">event</text>

  <!-- Built-in modules -->
  <rect x="595" y="110" width="230" height="105" rx="8" fill="#334155"/>
  <text x="710" y="135" text-anchor="middle" class="label" style="fill:#94a3b8">built-in modules</text>

  <rect x="610" y="148" width="95" height="26" rx="4" fill="#475569"/>
  <text x="657" y="166" text-anchor="middle" class="xs" style="fill:#cbd5e1">session_auth</text>

  <rect x="715" y="148" width="95" height="26" rx="4" fill="#475569"/>
  <text x="762" y="166" text-anchor="middle" class="xs" style="fill:#cbd5e1">datastar</text>

  <rect x="610" y="182" width="95" height="26" rx="4" fill="#475569"/>
  <text x="657" y="200" text-anchor="middle" class="xs" style="fill:#cbd5e1">tailwind</text>

  <rect x="715" y="182" width="95" height="26" rx="4" fill="#475569"/>
  <text x="762" y="200" text-anchor="middle" class="xs" style="fill:#cbd5e1">htmx</text>

  <!-- No shared state callout -->
  <rect x="595" y="232" width="230" height="98" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="710" y="258" text-anchor="middle" class="label" style="fill:#92400e">No shared state</text>
  <text x="710" y="278" text-anchor="middle" class="sm" style="fill:#b45309">modules don't import</text>
  <text x="710" y="293" text-anchor="middle" class="sm" style="fill:#b45309">each other's internals</text>
  <text x="710" y="316" text-anchor="middle" class="note" style="fill:#92400e">hypermedia + events only</text>

  <!-- Bottom -->
  <rect x="30" y="365" width="820" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="440" y="384" text-anchor="middle" class="sm" style="fill:#64748b">each module = routes + handlers + db + migrations + seeds + templates + events — one folder, zero cross-cutting</text>
</svg>